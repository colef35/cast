<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAST — by Low Level Logic Labs</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #6c6bff;
    --accent2: #4ade80;
    --danger: #f87171;
    --text: #e2e2f0;
    --muted: #6b6b8a;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* AUTH */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .auth-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
  }
  .auth-box h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .auth-box h1 span { color: var(--accent); }
  .auth-box p { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input {
    width: 100%; padding: 12px 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 13px; border-radius: 8px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); margin-top: 12px; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }

  /* DASHBOARD */
  #app { display: none; }
  .header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header-logo { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
  .header-logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
  .badge-trial { background: rgba(108,107,255,0.15); color: var(--accent); }
  .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; }
  .logout-btn:hover { color: var(--text); }

  .main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-card .num { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .stat-card.green .num { color: var(--accent2); }
  .stat-card.blue .num { color: var(--accent); }
  .stat-card.yellow .num { color: #fbbf24; }
  .stat-card.red .num { color: var(--danger); }

  /* ACTIONS */
  .actions-row { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
  .scan-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .scan-btn:hover { opacity: 0.85; }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .filter-tabs { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .filter-tab { padding: 6px 14px; border-radius: 6px; border: none; background: none; color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .filter-tab.active { background: var(--bg); color: var(--text); }

  /* SECTION HEADER */
  .section-header { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

  /* OPPORTUNITY CARDS */
  .opp-list { display: flex; flex-direction: column; gap: 12px; }
  .opp-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; transition: border-color 0.2s;
  }
  .opp-card:hover { border-color: #2e2e4e; }
  .opp-card.approved { border-color: rgba(74,222,128,0.3); }
  .opp-card.rejected { opacity: 0.4; }
  .opp-card.sent { border-color: rgba(108,107,255,0.3); }
  .opp-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .channel-tag {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .ch-hackernews { background: rgba(255,102,0,0.15); color: #ff6600; }
  .ch-reddit { background: rgba(255,69,0,0.15); color: #ff4500; }
  .ch-youtube { background: rgba(255,0,0,0.15); color: #ff0000; }
  .ch-forum { background: rgba(108,107,255,0.15); color: var(--accent); }
  .roi-tag { font-size: 12px; color: var(--muted); margin-left: auto; }
  .roi-high { color: var(--accent2); }
  .opp-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
  .opp-title a { color: var(--text); text-decoration: none; }
  .opp-title a:hover { color: var(--accent); }
  .opp-body { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .draft-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 13px; line-height: 1.6; color: #b0b0d0; margin-bottom: 14px; }
  .draft-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .opp-actions { display: flex; gap: 8px; }
  .btn-approve { background: rgba(74,222,128,0.15); color: var(--accent2); border: 1px solid rgba(74,222,128,0.3); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-approve:hover { background: rgba(74,222,128,0.25); }
  .btn-reject { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-reject:hover { background: rgba(248,113,113,0.2); }
  .btn-send { background: rgba(108,107,255,0.15); color: var(--accent); border: 1px solid rgba(108,107,255,0.3); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-send:hover { background: rgba(108,107,255,0.25); }
  .status-pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-left: auto; }
  .status-approved { background: rgba(74,222,128,0.15); color: var(--accent2); }
  .status-sent { background: rgba(108,107,255,0.15); color: var(--accent); }
  .status-rejected { background: rgba(248,113,113,0.1); color: var(--danger); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* LOADING */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(108,107,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PRODUCT SETUP */
  .product-setup { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .product-setup h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .product-setup p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .product-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .product-form .full { grid-column: 1 / -1; }
  .product-form input, .product-form textarea {
    width: 100%; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    outline: none; font-family: inherit;
  }
  .product-form input:focus, .product-form textarea:focus { border-color: var(--accent); }
  .product-form textarea { resize: vertical; min-height: 80px; }
  .product-form label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
  .save-product-btn { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .product-form { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>CAST<span>.</span></h1>
    <p>Autonomous marketing by Low Level Logic Labs</p>

    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <button class="btn btn-ghost" onclick="showRegister()">Create account →</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@company.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
      <button class="btn btn-ghost" onclick="showLogin()">← Back to sign in</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app">
  <div class="header">
    <div class="header-logo">CAST<span>.</span></div>
    <div class="header-right">
      <span class="badge badge-trial" id="plan-badge">trial</span>
      <span id="user-email-display" style="font-size:13px;color:var(--muted)"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card blue"><div class="num" id="stat-total">—</div><div class="label">Total Found</div></div>
      <div class="stat-card yellow"><div class="num" id="stat-pending">—</div><div class="label">Pending Review</div></div>
      <div class="stat-card green"><div class="num" id="stat-sent">—</div><div class="label">Posted</div></div>
      <div class="stat-card"><div class="num" id="stat-hn">—</div><div class="label">HN / Reddit / YT</div></div>
    </div>

    <!-- PRODUCT SETUP (shown when no product exists) -->
    <div class="product-setup" id="product-setup" style="display:none">
      <h3>Set up your product</h3>
      <p>Tell CAST what you're marketing so it can find the right opportunities and write targeted drafts.</p>
      <div class="product-form">
        <div>
          <label>Product Name</label>
          <input id="p-name" placeholder="DATUM+" />
        </div>
        <div>
          <label>URL</label>
          <input id="p-url" placeholder="https://yourproduct.com" />
        </div>
        <div class="full">
          <label>Tagline</label>
          <input id="p-tagline" placeholder="All-in-one construction management at $49/month" />
        </div>
        <div class="full">
          <label>Description</label>
          <textarea id="p-desc" placeholder="What does your product do? Who is it for?"></textarea>
        </div>
        <div>
          <label>Target Audience</label>
          <input id="p-audience" placeholder="Small contractors, subcontractors" />
        </div>
        <div>
          <label>Pain Point Solved</label>
          <input id="p-pain" placeholder="Too expensive software, manual processes" />
        </div>
        <div class="full">
          <label>Keywords (comma-separated)</label>
          <input id="p-keywords" placeholder="construction software, job costing, contractor app" />
        </div>
      </div>
      <button class="save-product-btn" onclick="saveProduct()">Save & Start Scanning →</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions-row">
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">⚡ Scan Now</button>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-tab" onclick="setFilter('approved', this)">Approved</button>
        <button class="filter-tab" onclick="setFilter('sent', this)">Sent</button>
        <button class="filter-tab" onclick="setFilter('rejected', this)">Rejected</button>
      </div>
    </div>

    <div class="section-header" id="queue-label">Pending Review</div>
    <div id="opp-list" class="opp-list">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
const BASE = '';
let TOKEN = localStorage.getItem('cast_token');
let USER_ID = localStorage.getItem('cast_user_id');
let PRODUCT_ID = null;
let currentFilter = 'pending';

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) },
    ...(body ? { body: JSON.stringify(body) } : {}),
  };
  const r = await fetch(BASE + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

function showLogin() {
  document.getElementById('login-form').style.display = '';
  document.getElementById('register-form').style.display = 'none';
}
function showRegister() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('register-form').style.display = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-error').textContent = '';
  try {
    const r = await api('POST', '/user/login', { email, password: pass });
    TOKEN = r.token; USER_ID = r.user_id;
    localStorage.setItem('cast_token', TOKEN);
    localStorage.setItem('cast_user_id', USER_ID);
    initDashboard(r.email, r.plan);
  } catch(e) {
    document.getElementById('login-error').textContent = e.message;
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  document.getElementById('reg-error').textContent = '';
  if (!email || !pass) { document.getElementById('reg-error').textContent = 'Email and password required'; return; }
  try {
    const r = await api('POST', '/user/register', { email, password: pass });
    TOKEN = r.token; USER_ID = r.user_id;
    localStorage.setItem('cast_token', TOKEN);
    localStorage.setItem('cast_user_id', USER_ID);
    initDashboard(r.email, r.plan);
  } catch(e) {
    document.getElementById('reg-error').textContent = e.message;
  }
}

function logout() {
  localStorage.removeItem('cast_token');
  localStorage.removeItem('cast_user_id');
  TOKEN = null; USER_ID = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function initDashboard(email, plan) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('user-email-display').textContent = email || '';
  const badge = document.getElementById('plan-badge');
  badge.textContent = plan || 'trial';
  loadStats();
  await checkProduct();
  loadOpportunities();
}

async function checkProduct() {
  try {
    const products = await api('GET', '/products/?user_id=' + USER_ID);
    if (products.length === 0) {
      document.getElementById('product-setup').style.display = '';
      document.getElementById('scan-btn').disabled = true;
    } else {
      PRODUCT_ID = products[0].id;
      document.getElementById('product-setup').style.display = 'none';
      document.getElementById('scan-btn').disabled = false;
    }
  } catch(e) { console.error(e); }
}

async function saveProduct() {
  const keywords = document.getElementById('p-keywords').value.split(',').map(k => k.trim()).filter(Boolean);
  try {
    const r = await api('POST', '/products/?user_id=' + USER_ID, {
      name: document.getElementById('p-name').value,
      tagline: document.getElementById('p-tagline').value,
      description: document.getElementById('p-desc').value,
      target_audience: document.getElementById('p-audience').value,
      pain_point_solved: document.getElementById('p-pain').value,
      url: document.getElementById('p-url').value,
      keywords,
    });
    PRODUCT_ID = r.id;
    document.getElementById('product-setup').style.display = 'none';
    document.getElementById('scan-btn').disabled = false;
    triggerScan();
  } catch(e) { alert('Error: ' + e.message); }
}

async function loadStats() {
  try {
    const s = await api('GET', '/stats?user_id=' + USER_ID);
    document.getElementById('stat-total').textContent = s.opportunities.total;
    document.getElementById('stat-pending').textContent = s.opportunities.pending;
    document.getElementById('stat-sent').textContent = s.opportunities.sent;
    const ch = s.opportunities.by_channel || {};
    document.getElementById('stat-hn').textContent =
      (ch.hackernews||0) + ' / ' + (ch.reddit||0) + ' / ' + (ch.youtube||0);
  } catch(e) { console.error(e); }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const labels = { pending: 'Pending Review', approved: 'Approved — Ready to Send', sent: 'Sent', rejected: 'Rejected' };
  document.getElementById('queue-label').textContent = labels[f];
  loadOpportunities();
}

async function loadOpportunities() {
  document.getElementById('opp-list').innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
  try {
    let opps;
    if (currentFilter === 'pending') {
      opps = await api('GET', '/opportunities/pending?user_id=' + USER_ID);
    } else {
      opps = await api('GET', '/opportunities/all?user_id=' + USER_ID + '&status=' + currentFilter);
    }
    renderOpps(opps);
  } catch(e) {
    document.getElementById('opp-list').innerHTML = '<div class="empty-state"><p style="color:var(--danger)">' + e.message + '</p></div>';
  }
}

function renderOpps(opps) {
  const el = document.getElementById('opp-list');
  if (!opps.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">✓</div><h3>Nothing here</h3><p>Trigger a scan to find new opportunities.</p></div>';
    return;
  }
  el.innerHTML = opps.map(o => oppCard(o)).join('');
}

function chClass(ch) {
  return { hackernews: 'ch-hackernews', reddit: 'ch-reddit', youtube: 'ch-youtube', forum: 'ch-forum' }[ch] || '';
}

function oppCard(o) {
  const roi = Math.round((o.roi_score || 0) * 100);
  const roiClass = roi >= 60 ? 'roi-high' : '';
  const actions = o.status === 'pending'
    ? `<button class="btn-approve" onclick="approve('${o.id}', this)">✓ Approve</button>
       <button class="btn-reject" onclick="reject('${o.id}', this)">✕ Reject</button>`
    : o.status === 'approved'
    ? `<button class="btn-send" onclick="send('${o.id}', this)">→ Post Now</button>
       <span class="status-pill status-approved">Approved</span>`
    : `<span class="status-pill status-${o.status}">${o.status}</span>`;

  return `
  <div class="opp-card ${o.status}" id="card-${o.id}">
    <div class="opp-meta">
      <span class="channel-tag ${chClass(o.channel)}">${o.channel}</span>
      <span class="roi-tag ${roiClass}">ROI ${roi}%</span>
    </div>
    <div class="opp-title"><a href="${o.source_url}" target="_blank">${escHtml(o.source_title)}</a></div>
    ${o.source_body ? `<div class="opp-body">${escHtml(o.source_body)}</div>` : ''}
    ${o.draft ? `<div class="draft-label">Draft</div><div class="draft-box">${escHtml(o.draft)}</div>` : ''}
    <div class="opp-actions">${actions}</div>
  </div>`;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function approve(id, btn) {
  btn.disabled = true; btn.textContent = '...';
  try {
    await api('PATCH', '/opportunities/' + id + '/approve?user_id=' + USER_ID);
    document.getElementById('card-' + id)?.remove();
    loadStats();
  } catch(e) { btn.disabled = false; btn.textContent = '✓ Approve'; alert(e.message); }
}

async function reject(id, btn) {
  btn.disabled = true; btn.textContent = '...';
  try {
    await api('PATCH', '/opportunities/' + id + '/reject?user_id=' + USER_ID);
    document.getElementById('card-' + id)?.remove();
    loadStats();
  } catch(e) { btn.disabled = false; btn.textContent = '✕ Reject'; alert(e.message); }
}

async function send(id, btn) {
  btn.disabled = true; btn.textContent = 'Posting...';
  try {
    await api('PATCH', '/opportunities/' + id + '/send?user_id=' + USER_ID);
    document.getElementById('card-' + id)?.remove();
    loadStats();
  } catch(e) { btn.disabled = false; btn.textContent = '→ Post Now'; alert(e.message); }
}

async function triggerScan() {
  if (!PRODUCT_ID) return;
  const btn = document.getElementById('scan-btn');
  btn.disabled = true; btn.textContent = '⚡ Scanning...';
  try {
    await api('POST', '/scan/hn/' + PRODUCT_ID + '?user_id=' + USER_ID);
    await api('POST', '/scan/reddit/' + PRODUCT_ID + '?user_id=' + USER_ID);
    await loadOpportunities();
    loadStats();
  } catch(e) { console.error(e); }
  btn.disabled = false; btn.textContent = '⚡ Scan Now';
}

// Bootstrap
if (TOKEN && USER_ID) {
  api('GET', '/user/me').then(u => initDashboard(u.email, u.plan)).catch(() => {
    localStorage.removeItem('cast_token');
    localStorage.removeItem('cast_user_id');
  });
}
</script>
</body>
</html>
